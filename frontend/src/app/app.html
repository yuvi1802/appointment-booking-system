<div class="dashboard">
  <!-- Header -->
  <header class="header">
  <div class="header-content">
    <img src="booking_logo.jpg" alt="Booking logo" class="header-logo" />
    <div class="header-text">
      <h1 class="header-title">Appointment Booking</h1>
      <p class="header-subtitle">Manage your appointments in one place</p>
    </div>
  </div>
</header>

  <main class="main-content">
    <section class="section">
      <app-search-filter
        (filterChange)="handleFilterChange($event)"
      ></app-search-filter>
    </section>

    <section class="section">
      <app-appointment-form
        [editingAppointment]="editingAppointment"
        [isSaving]="isSaving"
        (save)="handleSave($event)"
        (cancel)="handleCancelEdit()"
      ></app-appointment-form>
    </section>

    <section class="section">
      <app-appointment-list
        [appointments]="appointments"
        [hasActiveFilters]="hasActiveFilters"
        [deletingId]="deletingId"
        (edit)="handleEdit($event)"
        (delete)="handleDelete($event)"
      ></app-appointment-list>
    </section>
  </main>

  <!-- Delete confirmation modal -->
  <div
    class="modal-overlay"
    *ngIf="deleteTarget"
    (click)="cancelDelete()"
  >
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3 class="modal-title">Delete Appointment</h3>
      </div>
      <div class="modal-body">
        <p class="modal-message">
          Are you sure you want to delete this appointment?
        </p>
        <div class="modal-detail">
          <strong>{{ deleteTarget.customer_name }}</strong>
          <span>{{ deleteTarget.appointment_date | date: 'MMM d, y, h:mm a' }}</span>
        </div>
      </div>
      <div class="modal-actions">
        <button
          type="button"
          class="btn btn-secondary"
          [disabled]="deletingId !== null"
          (click)="cancelDelete()"
        >
          Cancel
        </button>
        <button
          type="button"
          class="btn btn-danger"
          [disabled]="deletingId !== null"
          (click)="confirmDelete()"
        >
          {{ deletingId !== null ? 'Deleting...' : 'Delete' }}
        </button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" *ngIf="toasts.length > 0">
    <div
      class="toast"
      *ngFor="let toast of toasts"
      [class.toast-success]="toast.type === 'success'"
      [class.toast-error]="toast.type === 'error'"
      (click)="dismissToast(toast.id)"
    >
      <span class="toast-icon">
        {{ toast.type === 'success' ? '✓' : '!' }}
      </span>
      <span class="toast-message">{{ toast.message }}</span>
    </div>
  </div>
</div>
